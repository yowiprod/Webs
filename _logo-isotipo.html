<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&display=swap" rel="stylesheet">
<style>
  :root{ --accent:#E0B23C; --graphite:#0c0c0f; --white:#fff; }
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:512px;height:512px;background:var(--graphite);display:flex;align-items:center;justify-content:center;
    background-image:radial-gradient(60% 50% at 80% 10%, rgba(224,178,60,.16), transparent 60%);}
  .logo{display:flex;flex-direction:column;align-items:center;gap:14px}
  .dtw{font-family:'Bricolage Grotesque';font-weight:800;font-size:120px;letter-spacing:-.03em;line-height:1;color:var(--white)}
  .dtw .o{color:var(--accent)}
</style>
</head>
<body>
  <div class="logo">
    <div class="dtw">D<span class="o">T</span>W</div>
    <svg width="120" height="72" viewBox="0 0 96 58" fill="none">
      <path d="M16 30 L48 6 L80 30" stroke="#E0B23C" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M16 52 L48 28 L80 52" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity=".88"/>
    </svg>
  </div>
</body>
</html>
