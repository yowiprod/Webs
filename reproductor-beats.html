<style>
  :root{
    --bg:#0a0806; --ink:#f4ecdb; --mut:rgba(244,236,219,.6); --mut2:rgba(244,236,219,.34);
    --gold:#cfa24a; --gold-lt:#f3d997;
    --glass:rgba(207,162,74,.07); --glass-h:rgba(207,162,74,.13);
    --panel:rgba(16,13,9,.82); --line:rgba(207,162,74,.2); --line2:rgba(244,236,219,.1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;background:#0a0806;overflow-x:hidden}
  ::selection{background:var(--gold);color:#0a0806}

  /* fondo demo (en tu web será tu vídeo) */
  #bg{position:fixed;inset:0;z-index:-2;background-size:cover;background-position:center;filter:blur(80px) brightness(.5) saturate(1.5);transform:scale(1.3);transition:background-image .7s;opacity:.85}
  #veil{position:fixed;inset:0;z-index:-1;pointer-events:none;background:radial-gradient(130% 100% at 50% -10%,rgba(207,162,74,.1),rgba(10,8,6,.85) 72%)}
  .demo{position:fixed;top:46%;left:0;right:0;text-align:center;transform:translateY(-50%);padding:0 20px;pointer-events:none}
  .demo .k{font-family:'Cinzel';color:var(--gold);letter-spacing:4px;font-size:clamp(22px,5vw,40px);text-transform:uppercase}
  .demo .s{color:var(--mut2);margin-top:14px;font-size:14px}
  .demo .arrow{margin-top:26px;color:var(--gold);font-size:22px;animation:bob 1.8s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}

  /* ===== SHEET / PLAYLIST DESPLEGABLE ===== */
  .scrim{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.45);opacity:0;visibility:hidden;transition:.3s}
  .scrim.open{opacity:1;visibility:visible}
  .sheet{position:fixed;left:0;right:0;bottom:66px;z-index:70;max-height:0;overflow:hidden;
    background:var(--panel);backdrop-filter:blur(26px);border-top:1px solid var(--line);
    transition:max-height .4s cubic-bezier(.25,.8,.25,1);box-shadow:0 -30px 60px -20px rgba(0,0,0,.7)}
  .sheet.open{max-height:72vh}
  .sheet .inner{max-width:1000px;margin:0 auto;padding:16px clamp(16px,5vw,34px) 18px}
  .sheet-head{display:flex;align-items:center;gap:14px;margin-bottom:12px;flex-wrap:wrap}
  .sheet-head h2{font-family:'Cinzel';font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}
  .sheet-head .count{color:var(--mut2);font-size:12.5px}
  .search{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--glass);border:1px solid var(--line);border-radius:9px;padding:8px 12px;width:min(260px,55vw)}
  .search:focus-within{border-color:var(--gold)}
  .search svg{flex:none;opacity:.5;color:var(--gold)}
  .search input{background:none;border:none;outline:none;color:var(--ink);font-size:13.5px;width:100%;font-family:inherit}
  .search input::placeholder{color:var(--mut2)}
  .filters{display:flex;gap:6px;flex-wrap:wrap;width:100%}
  .chip{background:var(--glass);border:1px solid var(--line);color:var(--mut);padding:5px 12px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;transition:.18s;white-space:nowrap}
  .chip:hover{color:var(--ink);border-color:var(--gold)}
  .chip.on{background:linear-gradient(180deg,var(--gold-lt),var(--gold));color:#0a0806;border-color:transparent;font-weight:600}
  .list{margin-top:10px;max-height:calc(72vh - 130px);overflow-y:auto;display:flex;flex-direction:column;gap:2px;padding-right:4px}
  .list::-webkit-scrollbar{width:7px}.list::-webkit-scrollbar-thumb{background:var(--line);border-radius:9px}
  .row{display:grid;grid-template-columns:24px 42px 1fr auto;align-items:center;gap:13px;padding:8px 10px;border-radius:10px;cursor:pointer;border:1px solid transparent;transition:.12s}
  .row:hover{background:var(--glass)}
  .row.active{background:var(--glass-h);border-color:var(--line)}
  .row.disabled{opacity:.36;cursor:default}.row.disabled:hover{background:transparent}
  .num{color:var(--mut2);font-size:12.5px;text-align:center}
  .row.active .num{color:var(--gold)}
  .rart{width:42px;height:42px;border-radius:7px;object-fit:cover;background:rgba(207,162,74,.07);flex:none}
  .rmeta{min-width:0}
  .rmeta .t{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row.active .rmeta .t{color:var(--gold-lt)}
  .rmeta .s{color:var(--mut);font-size:11.5px;margin-top:1px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .tag{font-size:9.5px;letter-spacing:.5px;text-transform:uppercase;padding:2px 6px;border-radius:5px;font-weight:600}
  .tag.free{background:rgba(207,162,74,.16);color:var(--gold-lt)}
  .tag.soon{background:rgba(244,236,219,.08);color:var(--mut)}
  .rright{color:var(--mut);font-size:12px;font-variant-numeric:tabular-nums}

  /* ===== BARRA / PLAYER ===== */
  .bar{position:fixed;left:0;right:0;bottom:0;z-index:80;height:66px;
    background:var(--panel);backdrop-filter:blur(26px);border-top:1px solid var(--line)}
  .prog{position:absolute;top:0;left:0;right:0;height:3px;background:rgba(244,236,219,.14);cursor:pointer}
  .prog .fill{height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--gold-lt));position:relative}
  .prog .fill::after{content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%);width:10px;height:10px;border-radius:50%;background:var(--gold-lt);box-shadow:0 0 8px var(--gold);opacity:0;transition:.15s}
  .prog:hover .fill::after{opacity:1}
  .barin{max-width:1000px;margin:0 auto;height:100%;display:flex;align-items:center;gap:14px;padding:0 clamp(14px,5vw,34px)}
  .now{display:flex;align-items:center;gap:11px;min-width:0;width:clamp(150px,30vw,280px);cursor:pointer}
  .now img{width:44px;height:44px;border-radius:8px;object-fit:cover;flex:none;background:rgba(207,162,74,.08)}
  .now .t{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .now .s{color:var(--mut);font-size:11.5px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ctr{display:flex;align-items:center;gap:8px;margin:0 auto}
  .cbtn{background:none;border:none;color:var(--ink);cursor:pointer;display:grid;place-items:center;transition:.15s;border-radius:50%}
  .cbtn:hover{color:var(--gold);transform:scale(1.1)}
  .cbtn.main{width:42px;height:42px;background:linear-gradient(180deg,var(--gold-lt),var(--gold));color:#0a0806;box-shadow:0 6px 18px -6px rgba(207,162,74,.6)}
  .cbtn.main:hover{filter:brightness(1.08);transform:scale(1.06)}
  .time{font-size:11.5px;color:var(--mut);font-variant-numeric:tabular-nums;width:84px;text-align:right}
  .vol{display:flex;align-items:center;gap:7px;width:96px;color:var(--mut)}
  .vol input{width:100%;accent-color:var(--gold);cursor:pointer}
  .toggle{background:var(--glass);border:1px solid var(--line);color:var(--gold);cursor:pointer;width:38px;height:34px;border-radius:9px;display:grid;place-items:center;transition:.18s}
  .toggle:hover{background:var(--glass-h)}
  .toggle svg{transition:transform .35s}
  .toggle.open svg{transform:rotate(180deg)}

  @media(max-width:720px){
    .now{width:auto}.now .s{display:none}.time{display:none}.vol{display:none}
    .search{width:100%;order:5;margin:0}
  }
</style>
</head>
<body>
<div id="bg"></div>
<div id="veil"></div>

<div class="demo">
  <div class="k">YOWIPROD</div>
  <div class="s">Aquí va tu web con el vídeo dorado de fondo · el reproductor es la barra de abajo</div>
  <div class="arrow">↓</div>
</div>

<!-- SCRIM -->
<div class="scrim" id="scrim"></div>

<!-- PLAYLIST DESPLEGABLE -->
<div class="sheet" id="sheet">
  <div class="inner">
    <div class="sheet-head">
      <h2>Beats</h2><span class="count" id="count"></span>
      <label class="search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="q" placeholder="Buscar beat, BPM…" autocomplete="off">
      </label>
      <div class="filters" id="filters"></div>
    </div>
    <div class="list" id="list"></div>
  </div>
</div>

<!-- BARRA / PLAYER -->
<div class="bar">
  <div class="prog" id="prog"><div class="fill" id="fill"></div></div>
  <div class="barin">
    <div class="now" id="now" title="Abrir lista">
      <img id="p-art" alt="">
      <div style="min-width:0"><div class="t" id="p-title">—</div><div class="s" id="p-sub">Pulsa play</div></div>
    </div>
    <div class="ctr">
      <button class="cbtn" id="prev" title="Anterior"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
      <button class="cbtn main" id="play" title="Play/Pausa"><svg id="ic" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
      <button class="cbtn" id="next" title="Siguiente"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM6 18l8.5-6L6 6z"/></svg></button>
    </div>
    <div class="time"><span id="cur">0:00</span> / <span id="dur">0:00</span></div>
    <div class="vol">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor" style="opacity:.6;flex:none"><path d="M3 9v6h4l5 5V4L7 9z"/></svg>
      <input type="range" id="volr" min="0" max="1" step="0.01" value="0.85">
    </div>
    <button class="toggle" id="toggle" title="Desplegar lista"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M7 14l5-5 5 5z"/></svg></button>
  </div>
</div>

const $=s=>document.querySelector(s);
const audio=$('#audio'), bg=$('#bg'), sheet=$('#sheet'), scrim=$('#scrim'), toggle=$('#toggle');
let queue=[], cur=-1, filter='all', search='';

const types=[...new Set(BEATS.map(b=>b.type).filter(Boolean))];
const fdefs=[{k:'all',l:'Todos'},{k:'play',l:'Con audio'},{k:'free',l:'Gratis'},...types.map(t=>({k:'type:'+t,l:t}))];
$('#filters').innerHTML=fdefs.map(f=>`<button class="chip ${f.k==='all'?'on':''}" data-k="${f.k}">${f.l}</button>`).join('');
$('#filters').addEventListener('click',e=>{const c=e.target.closest('.chip');if(!c)return;
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');filter=c.dataset.k;render();});
$('#q').addEventListener('input',e=>{search=e.target.value.toLowerCase().trim();render();});

function visible(){return BEATS.filter(b=>{
  if(filter==='play'&&!b.mp3)return false;
  if(filter==='free'&&!b.free)return false;
  if(filter.startsWith('type:')&&b.type!==filter.slice(5))return false;
  if(search){const hay=(b.title+' '+(b.bpm||'')+' '+(b.key||'')+' '+b.type).toLowerCase();if(!hay.includes(search))return false;}
  return true;});}
function render(){
  queue=visible();
  $('#count').textContent=`${queue.filter(b=>b.mp3).length} con audio · ${queue.length}`;
  $('#list').innerHTML=queue.map((b,i)=>{
    const tags=[b.free?'<span class="tag free">GRATIS</span>':'', !b.mp3?'<span class="tag soon">sin preview</span>':''].filter(Boolean).join('');
    const sub=[tags,b.type?`<span>${b.type}</span>`:''].filter(Boolean).join('');
    const bpm=b.bpm?`${b.bpm} BPM`:''; const key=b.key?` · ${b.key}`:'';
    const art=b.img?`<img class="rart" src="${b.img}" loading="lazy" alt="">`:`<div class="rart"></div>`;
    return `<div class="row ${b.mp3?'':'disabled'} ${cur>-1&&queue[cur]===b?'active':''}" data-i="${i}">
      <div class="num">${i+1}</div>${art}
      <div class="rmeta"><div class="t">${b.title}</div><div class="s">${sub}</div></div>
      <div class="rright">${bpm}${key}</div></div>`;
  }).join('')||`<div style="color:var(--mut);padding:24px;text-align:center">Sin resultados.</div>`;
}
$('#list').addEventListener('click',e=>{const r=e.target.closest('.row');if(!r||r.classList.contains('disabled'))return;load(parseInt(r.dataset.i),true);});

function openSheet(o){sheet.classList.toggle('open',o);scrim.classList.toggle('open',o);toggle.classList.toggle('open',o);}
toggle.onclick=()=>openSheet(!sheet.classList.contains('open'));
$('#now').onclick=()=>openSheet(!sheet.classList.contains('open'));
scrim.onclick=()=>openSheet(false);

function load(i,playNow){
  const b=queue[i]; if(!b||!b.mp3)return;
  cur=i;
  $('#p-art').src=b.img||''; if(b.img) bg.style.backgroundImage=`url("${b.img}")`;
  $('#p-title').textContent=b.title;
  $('#p-sub').textContent=[b.free?'GRATIS':'Premium',b.bpm?b.bpm+' BPM':'',b.key||''].filter(Boolean).join(' · ');
  audio.src=b.mp3; if(playNow) audio.play().catch(()=>{});
  render();
}
$('#play').onclick=()=>{if(!audio.src){const f=queue.findIndex(b=>b.mp3);if(f>=0)load(f,true);return;}audio.paused?audio.play():audio.pause();};
function setIc(p){$('#ic').innerHTML=p?'<path d="M6 5h4v14H6zm8 0h4v14h-4z"/>':'<path d="M8 5v14l11-7z"/>';}
audio.onplay=()=>setIc(true); audio.onpause=()=>setIc(false);
function step(d){let n=cur;for(let k=0;k<queue.length;k++){n=(n+d+queue.length)%queue.length;if(queue[n].mp3){load(n,true);return;}}}
$('#next').onclick=()=>step(1);
$('#prev').onclick=()=>{if(audio.currentTime>3){audio.currentTime=0;return;}step(-1);};
audio.onended=()=>step(1);

const fmt=s=>isNaN(s)?'0:00':Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');
const prog=$('#prog');
audio.ontimeupdate=()=>{$('#fill').style.width=(audio.currentTime/audio.duration*100||0)+'%';$('#cur').textContent=fmt(audio.currentTime);};
audio.onloadedmetadata=()=>$('#dur').textContent=fmt(audio.duration);
prog.onclick=e=>{const r=prog.getBoundingClientRect();if(audio.duration)audio.currentTime=(e.clientX-r.left)/r.width*audio.duration;};
$('#volr').oninput=e=>audio.volume=e.target.value; audio.volume=0.85;

document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();$('#play').click();}
  if(e.code==='ArrowRight')$('#next').click(); if(e.code==='ArrowLeft')$('#prev').click();
  if(e.code==='Escape')openSheet(false);});

render();
const first=queue.findIndex(b=>b.mp3);
if(first>=0) load(first,false);
</script>
