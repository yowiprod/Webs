<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --accent:#E0B23C; --graphite:#0c0c0f; --white:#fff; --grey:#9a9aa0; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{margin:0;background:var(--graphite)}
  .face{
    position:relative;width:91mm;height:61mm;overflow:hidden;color:var(--white);
    background:
      radial-gradient(60% 80% at 100% 105%, rgba(224,178,60,.32), transparent 60%),
      radial-gradient(45% 55% at 92% 6%, rgba(224,178,60,.15), transparent 60%),
      radial-gradient(80% 90% at 0% 0%, #131316, transparent 70%),
      var(--graphite);
    padding:8mm;font-family:'Hanken Grotesk',Arial,sans-serif;
    display:flex;flex-direction:column;justify-content:space-between;
  }
  .lbl{font-family:'Hanken Grotesk';font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--accent)}
  .lbl-grey{color:var(--grey)}
  .front-top{display:flex;justify-content:space-between;align-items:flex-start}
  .front-top .lbl{font-size:2.7mm}
  .iso{display:flex;flex-direction:column;align-items:center;gap:.8mm;flex:0 0 auto}
  .iso svg{width:8mm;height:auto;display:block}
  .iso .dtw{font-family:'Bricolage Grotesque';font-weight:800;font-size:3.4mm;letter-spacing:-.02em;color:var(--white);line-height:1}
  .iso .dtw .o{color:var(--accent)}
  .brand{font-family:'Bricolage Grotesque';font-weight:800;line-height:.9;letter-spacing:-.02em}
  .brand .l1{font-size:11mm;color:var(--white)}
  .brand .l2{font-size:11mm;color:var(--accent)}
  .front-bottom{display:flex;justify-content:space-between;align-items:flex-end;gap:6mm}
  .slogan{color:var(--grey);font-size:3mm;line-height:1.3;font-weight:500;max-width:48mm}
  .est{text-align:right}
  .est .lbl{font-size:2.5mm;display:block;line-height:1.7}
</style>
</head>
<body>
  <div class="face front">
    <div class="front-top">
      <span class="lbl">Diseño · Desarrollo · Web</span>
      <div class="iso">
        <svg viewBox="0 0 96 58" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 30 L48 6 L80 30" stroke="#E0B23C" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M16 52 L48 28 L80 52" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity=".88"/>
        </svg>
        <span class="dtw">D<span class="o">T</span>W</span>
      </div>
    </div>
    <div class="brand">
      <div class="l1">Destacamos</div>
      <div class="l2">Tu Web</div>
    </div>
    <div class="front-bottom">
      <p class="slogan">Diseñamos el futuro de tu negocio con webs hechas a medida.</p>
      <div class="est">
        <span class="lbl lbl-grey">Est. 2026</span>
        <span class="lbl lbl-grey">Agencia · ES</span>
      </div>
    </div>
  </div>
</body>
</html>
