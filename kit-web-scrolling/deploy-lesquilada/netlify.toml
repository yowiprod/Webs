# Configuració de Netlify per a L'Esquilada
# Lloc estàtic: no hi ha build, només es publica la carpeta tal qual.

[build]
  publish = "."

# Memòria cau per a les imatges (millora la velocitat)
[[headers]]
  for = "/assets-lesquilada/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
